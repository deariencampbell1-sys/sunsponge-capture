<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canvas Page — 80% viewport canvas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: sans-serif; }
  #app { position: relative; width: 100vw; height: 100vh; }
  #my-canvas {
    position: absolute; top: 10%; left: 10%;
    width: 80vw; height: 80vh;
    background: #222;
  }
  #chrome { position: absolute; top: 0; left: 0; right: 0; height: 40px;
    background: rgba(0,0,0,0.7); display: flex; align-items: center;
    padding: 0 16px; font-size: 14px; color: #ccc; }
</style>
</head>
<body>
<div id="app">
  <div id="chrome">Canvas App — 80% canvas area</div>
  <canvas id="my-canvas"></canvas>
</div>
<script>
  const c = document.getElementById('my-canvas');
  c.width = c.offsetWidth;
  c.height = c.offsetHeight;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3366cc';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff';
  ctx.font = '24px sans-serif';
  ctx.fillText('Canvas Demo', 50, 100);
</script>
</body>
</html>
